name: sync_latest_openlist

on:
  # 支持手动触发
  workflow_dispatch:
  # 每小时执行一次（整点 UTC Time）
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: check_openlist_has_new_version
        run: |
          # 定义版本号比较函数
          version_compare() {
              # 第一步：去掉开头的 v，如 v4.1.9 → 4.1.9
              local ver1=$(echo "$1" | sed 's/^v//'
              local ver2=$(echo "$2" | sed 's/^v//')
          
              # 第二步：空值兜底 + 过滤非法字符
              ver1=${ver1:-0.0.0}
              ver2=${ver2:-0.0.0}
              ver1=$(echo "$ver1" | tr -cd '0-9.')  # 只保留数字和点
              ver2=$(echo "$ver2" | tr -cd '0-9.')
          
              if [[ "$ver1" == "$ver2" ]]; then
                  return 0
              fi
          
              # 第三步：按 . 分割版本号，逐位数值比较
              local IFS=.
              local arr1=($ver1) arr2=($ver2)
              local max_len=$(( ${#arr1[@]} > ${#arr2[@]} ? ${#arr1[@]} : ${#arr2[@]} ))
          
              for ((i=0; i<max_len; i++)); do
                  # 空位补 0 + 强制转整数（避免非数字）
                  local v1=${arr1[i]:-0}
                  local v2=${arr2[i]:-0}
                  v1=$((v1)) 2>/dev/null || v1=0
                  v2=$((v2)) 2>/dev/null || v2=0
          
                  if (( v1 > v2 )); then
                      return 1
                  elif (( v1 < v2 )); then
                      return -1
                  fi
              done
              return 0
          }

          # 获取当前和最新版本号
          export CURRENT_OPENLIST_VERSION=$(curl -k -sL https://api.github.com/repos/LeoHaoVIP/AListLiteAndroid/releases/latest | grep '"name": "From OpenList v' | cut -d'"' -f4 | cut -d'v' -f2)
          export LATEST_OPENLIST_VERSION=$(curl -k -sL https://api.github.com/repos/OpenListTeam/OpenList/releases/latest | grep '"tag_name": ".*"' | cut -d'"' -f4 | cut -d'v' -f2)
          
          # 输出版本号用于调试
          echo "CURRENT_OPENLIST_VERSION: ${CURRENT_OPENLIST_VERSION}"
          echo "LATEST_OPENLIST_VERSION: ${LATEST_OPENLIST_VERSION}"
          
          # 调用版本比较函数
          version_compare "$LATEST_OPENLIST_VERSION" "$CURRENT_OPENLIST_VERSION"
          compare_result=$?
          
          # 根据比较结果执行逻辑
          if [[ $compare_result -eq 1 ]]; then
              echo "OpenList Need to Be Updated! (${LATEST_OPENLIST_VERSION} > ${CURRENT_OPENLIST_VERSION})"
              gh workflow run build_and_release.yml -R LeoHaoVIP/AListLiteAndroid
          else
              echo "No Need to Update. (${LATEST_OPENLIST_VERSION} <= ${CURRENT_OPENLIST_VERSION})"
          fi
