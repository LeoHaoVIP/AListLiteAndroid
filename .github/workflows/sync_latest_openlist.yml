name: sync_latest_openlist

on:
  # 支持手动触发
  workflow_dispatch:
  # 每小时执行一次（整点 UTC Time）
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: check_openlist_has_new_version
        run: |
          # 1. 获取版本号（去除前缀 v）
          CURRENT=$(curl -k -sL https://api.github.com/repos/LeoHaoVIP/AListLiteAndroid/releases/latest | grep '"name": "From OpenList v' | cut -d'"' -f4 | cut -d'v' -f2 || echo "0.0.0")
          LATEST=$(curl -k -sL https://api.github.com/repos/OpenListTeam/OpenList/releases/latest | grep '"tag_name": ".*"' | cut -d'"' -f4 | cut -d'v' -f2 || echo "0.0.0")
          
          # 2. 核心：用 sort -V 比较版本号
          if [[ $(echo -e "$CURRENT\n$LATEST" | sort -V | tail -n1) == "$LATEST" && "$CURRENT" != "$LATEST" ]]; then
              echo "OpenList Need to Be Updated! ($LATEST > $CURRENT)"
              gh workflow run build_and_release.yml -R LeoHaoVIP/AListLiteAndroid
          else
              echo "No Need to Update. ($LATEST <= $CURRENT)"
          fi
